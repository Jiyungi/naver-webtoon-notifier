<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Naver Webtoon Picker</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Naver Webtoon Notifier</p>
        <h1>완결 알림 받을 웹툰을 골라보세요.</h1>
        <p class="lede">
          요일별로 둘러보거나 검색해서 작품을 선택하면
          <span>추가하기</span> 버튼으로 워치리스트에 등록할 수 있습니다.
        </p>
      </section>

      <section class="controls">
        <input id="search" type="search" placeholder="제목 검색">
        <div id="weekdayFilters" class="weekday-filters"></div>
        <div class="view-filters">
          <button id="viewAll" class="view-chip active" type="button">전체 보기</button>
          <button id="viewTracked" class="view-chip" type="button">내 워치리스트</button>
        </div>
      </section>

      <section class="selection-bar">
        <div>
          <strong id="selectedCount">0</strong>개 선택됨
        </div>
        <div class="selection-actions">
          <button id="clearSelection" class="ghost">선택 해제</button>
          <button id="createIssue" class="primary" disabled>추가하기</button>
        </div>
      </section>

      <section id="grid" class="grid"></section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <button class="card-button" type="button">
          <img class="thumb" alt="">
          <div class="card-body">
            <div class="badges">
              <span class="weekday"></span>
              <span class="tracked hidden">Tracked</span>
            </div>
            <h2 class="title"></h2>
            <p class="meta"></p>
          </div>
        </button>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
  </html>
