<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Naver Webtoon Picker</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Naver Webtoon Notifier</p>
        <h1>웹툰을 고르면, 완결되면 텔레그램으로 알려줍니다.</h1>
        <p class="lede">
          요일별 목록을 둘러보고 작품을 선택한 뒤 <span>Track Selected</span> 를 누르세요.
          GitHub issue 로 요청이 생성되고, Actions 가 자동으로 감시 목록에 등록합니다.
        </p>
      </section>

      <section class="controls">
        <input id="search" type="search" placeholder="제목 검색">
        <div id="weekdayFilters" class="weekday-filters"></div>
      </section>

      <section class="selection-bar">
        <div>
          <strong id="selectedCount">0</strong> selected
        </div>
        <div class="selection-actions">
          <button id="clearSelection" class="ghost">Clear</button>
          <button id="createIssue" class="primary" disabled>Track Selected</button>
        </div>
      </section>

      <section id="grid" class="grid"></section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <button class="card-button" type="button">
          <img class="thumb" alt="">
          <div class="card-body">
            <div class="badges">
              <span class="weekday"></span>
              <span class="tracked hidden">Tracked</span>
            </div>
            <h2 class="title"></h2>
            <p class="meta"></p>
          </div>
        </button>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
  </html>
