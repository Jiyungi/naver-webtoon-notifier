name: Check Webtoon Completions

on:
  schedule:
    # Runs daily at 1:30 PM UTC = 10:00 PM KST = 7:00 PM IST
    - cron: '30 13 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit watchlist state back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run webtoon checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: python src/check.py

      - name: Commit updated watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist.json
          git diff --staged --quiet || git commit -m "Update watchlist state [skip ci]"
          git push
