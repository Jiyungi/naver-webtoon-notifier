name: Process Subscription Request

on:
  issues:
    types: [opened]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'subscription-request') || contains(github.event.issue.body, 'subscription-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process request issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/process_subscription_issue.py

      - name: Export visual catalog data
        run: python src/export_catalog.py

      - name: Commit updated watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist.json docs/catalog.json docs/tracked.json
          git diff --staged --quiet || git commit -m "Update watchlist from subscription request [skip ci]"
          git pull --rebase origin main
          git push
